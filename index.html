<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">
                <img src="neu.png" alt="NEU Logo" class="navbar-logo-img">
                <span class="navbar-text">NEU Library</span>
            </a>
            <div class="navbar-menu">
            </div>
            <button class="navbar-toggle" onclick="toggleMobileMenu()">☰</button>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <img src="neu.png" alt="NEU Logo" style="width: 60px; height: 60px; object-fit: contain;">
                </div>
                <h1>NEU ERA UNIVERSITY</h1>
                <h2>Library Management System</h2>
            </div>

            <div class="login-form-section">
                <h3>SECURE ACCESS PORTAL</h3>
                <h1 class="signin-title">Sign In</h1>
                <p class="signin-subtitle">Enter your student or faculty ID number.</p>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="studentId">ID NUMBER</label>
                        <input type="text" id="studentId" placeholder="22 - 12345 - 123" required>
                    </div>

                    <button type="submit" class="signin-btn">SIGN IN</button>
                </form>

                <div class="divider">OR</div>

                <button class="google-btn" onclick="loginWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="10"></circle>
                    </svg>
                    Continue with Google
                </button>

                <div class="signup-section">
                    <p>No account? <a href="#" class="signup-link">Create Account</a></p>
                </div>
            </div>

            <footer class="login-footer">
                <p>NEU ERA UNIVERSITY — LIBRARY MANAGEMENT SYSTEM</p>
            </footer>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="registrationModal" class="modal registration-modal">
        <div class="modal-content registration-content">
            <h2>Register Member</h2>
            <form id="registrationForm" onsubmit="handleRegistration(event)">
                <div class="form-group">
                    <label for="regStudentId">ID Number (e.g. 24-12787-308)</label>
                    <input type="text" id="regStudentId" placeholder="ID Number" required>
                </div>

                <div class="form-group">
                    <label for="regFullName">Full Name</label>
                    <input type="text" id="regFullName" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <label for="regUserType">USER TYPE</label>
                    <select id="regUserType" required>
                        <option value="">Select User Type</option>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="regCollege">COLLEGE</label>
                    <select id="regCollege" required>
                        <option value="">Select College</option>
                        <option value="CICS">College of Informatics & Computing Sciences (CICS)</option>
                        <option value="CAS">College of Arts and Sciences</option>
                        <option value="COED">College of Education</option>
                        <option value="COE">College of Engineering</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="regYearLevel">YEAR LEVEL</label>
                    <select id="regYearLevel" required>
                        <option value="">Select Year Level</option>
                        <option value="1st">1st Year</option>
                        <option value="2nd">2nd Year</option>
                        <option value="3rd">3rd Year</option>
                        <option value="4th">4th Year</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="regCourse">Course (e.g. BSIT)</label>
                    <input type="text" id="regCourse" placeholder="Course">
                </div>

                <button type="submit" class="signin-btn">CREATE ACCOUNT</button>
                <button type="button" class="cancel-btn" onclick="closeRegistration()">CANCEL</button>
            </form>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
