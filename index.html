<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEU Library - Staff Portal</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --neu-green: #006400; 
      --neu-gold: #FFD700;  
      --bg: #f8fafc;
      --nav-bg: #ffffff;
      --text: #1e293b;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
    
    /* NAVIGATION */
    .topnav { display: flex; align-items: center; justify-content: space-between; padding: 10px 30px; background: var(--nav-bg); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
    .logo-area { display: flex; align-items: center; gap: 10px; }
    .logo-img { height: 45px; }
    .logo-text { font-weight: 900; font-size: 1.2rem; color: var(--neu-green); }
    
    .logout-btn { background: #cc0000; color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

    /* FILTER SECTION */
    .filter-bar { 
        background: white; padding: 20px; border-radius: 50px; 
        display: flex; align-items: center; gap: 15px; 
        box-shadow: 0 2px 15px rgba(0,0,0,0.05); margin-bottom: 30px;
    }
    .filter-label { font-weight: bold; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; margin-right: 10px; }
    .filter-bar select { 
        width: auto; margin-bottom: 0; padding: 10px 15px; 
        border-radius: 12px; border: 1px solid #e2e8f0; background: #f1f5f9;
        font-size: 0.9rem; font-weight: 600;
    }
    .record-count { 
        margin-left: auto; background: #f0fdf4; color: #166534; 
        padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 0.8rem;
        border: 1px solid #bbf7d0;
    }

    /* GRID LAYOUT FOR ANALYTICS */
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
    .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .card h3 { margin-top: 0; font-size: 0.9rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

    /* LOG STYLING */
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
    .log-info b { display: block; font-size: 1rem; }
    .log-info span { color: #94a3b8; font-size: 0.8rem; }
    .log-time { color: var(--neu-green); font-weight: 800; font-size: 0.9rem; }

    .hidden { display: none; }
    button { background: var(--neu-green); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; }
    
    .reg-link-container { text-align: center; margin-top: 20px; cursor: pointer; }
    .reg-link b { color: var(--neu-green); }

    #userProfile { display: none; margin-top: 20px; padding: 25px; border: 2px solid var(--neu-gold); border-radius: 20px; text-align: center; background: white; }
    .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--neu-green); object-fit: cover; }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="logo-area">
    <img src="neu.png" alt="NEU Logo" class="logo-img">
    <div class="logo-text">STAFF PORTAL</div>
  </div>
  <div class="nav-links">
    <a href="#" class="logout-btn" id="logout-ui" style="display:none" onclick="location.reload()">LOGOUT</a>
  </div>
</nav>

<div class="container">
  
  <div id="section-timein">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2 style="text-align: center; color: var(--neu-green);">Library Time-In</h2>
        <input type="text" id="idInput" placeholder="Enter ID Number" onkeydown="if(event.key==='Enter') handleTimeIn()">
        <button onclick="handleTimeIn()">SUBMIT ENTRY →</button>
        <div class="reg-link-container" onclick="switchTab('signup')">
            <span class="reg-link">New user? <b>Register here</b></span>
        </div>
    </div>

    <div id="userProfile">
      <img id="dispPic" src="" class="profile-pic">
      <h2 id="dispName" style="margin:10px 0 0;"></h2>
      <p id="dispDetails"></p>
      <hr>
      <div style="text-align: left;">
        <strong>Recent Logs:</strong>
        <div id="logBody"></div>
      </div>
    </div>
    
    <div style="text-align:center; margin-top:20px;">
        <a href="#" onclick="switchTab('admin')" style="color:#94a3b8; font-size:0.8rem; text-decoration:none;">Admin Access</a>
    </div>
  </div>

  <div id="section-admin" class="hidden">
    
    <div class="filter-bar">
        <span class="filter-label">Filters:</span>
        <select><option>All Reasons</option><option>Study</option><option>Research</option></select>
        <select><option>All Colleges</option><option>BSIT</option><option>BSCS</option><option>BSA</option></select>
        <select><option>All Users</option><option>Student</option><option>Faculty</option></select>
        <div class="record-count" id="countDisplay">DISPLAYING: 0 RECORDS</div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Traffic Analytics</h3>
            <div style="height: 250px;"><canvas id="trafficChart"></canvas></div>
        </div>

        <div class="card">
            <h3>Live Activity Log</h3>
            <div id="adminLogsBody" style="max-height: 300px; overflow-y: auto;">
                </div>
        </div>
    </div>

    <button style="background:#64748b;" onclick="switchTab('timein')">← BACK TO ATTENDANCE</button>
  </div>

  <div id="section-signup" class="hidden">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2>Register Member</h2>
        <input type="text" id="regID" placeholder="ID Number">
        <input type="text" id="regName" placeholder="Full Name">
        <select id="regType"><option value="Student">Student</option><option value="Faculty">Faculty</option></select>
        <input type="text" id="regCourse" placeholder="College / Course">
        <input type="text" id="regPhoto" placeholder="Photo URL (Optional)">
        <button onclick="handleSignUp()">CREATE ACCOUNT</button>
        <button style="background:none; color:#64748b; margin-top:10px;" onclick="switchTab('timein')">CANCEL</button>
    </div>
  </div>

</div>

<script>
  // FIREBASE CONFIG (Gamitin ang dati mong config dito)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let trafficChart = null;

  function switchTab(tab) {
    if(tab === 'admin') {
        const p = prompt("Enter Admin Password:");
        if(p !== "admin123") return;
        document.getElementById('logout-ui').style.display = 'block';
        loadAnalytics();
        loadLiveLogs();
    }
    document.getElementById('section-timein').classList.add('hidden');
    document.getElementById('section-signup').classList.add('hidden');
    document.getElementById('section-admin').classList.add('hidden');
    document.getElementById('section-' + tab).classList.remove('hidden');
  }

  function handleTimeIn() {
    const rawId = document.getElementById('idInput').value.trim();
    const sId = rawId.replace(/\./g, '_');
    
    db.ref('users/' + sId).once('value', snap => {
      if(!snap.exists()) return alert("ID Not Found!");
      
      const u = snap.val();
      const now = new Date();
      const log = {
        id: rawId, name: u.name, course: u.course,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}),
        day: now.toLocaleDateString('en-US', {weekday:'short'})
      };

      db.ref('logs').push(log).then(() => {
        document.getElementById('userProfile').style.display = 'block';
        document.getElementById('dispPic').src = u.photo || "https://via.placeholder.com/150";
        document.getElementById('dispName').innerText = u.name;
        document.getElementById('dispDetails').innerText = u.course;
        document.getElementById('idInput').value = "";
      });
    });
  }

  function loadLiveLogs() {
    db.ref('logs').limitToLast(30).on('value', snap => {
      let h = "";
      let count = 0;
      let arr = [];
      snap.forEach(c => { arr.push(c.val()); count++; });
      
      arr.reverse().forEach(l => {
        h += `<div class="log-item">
                <div class="log-info">
                    <b>${l.name}</b>
                    <span>${l.course}</span>
                </div>
                <div class="log-time">${l.time}</div>
              </div>`;
      });
      document.getElementById('adminLogsBody').innerHTML = h;
      document.getElementById('countDisplay').innerText = `DISPLAYING: ${count} RECORDS`;
    });
  }

  function loadAnalytics() {
    db.ref('logs').on('value', snap => {
      const counts = { Mon:0, Tue:0, Wed:0, Thu:0, Fri:0, Sat:0 };
      snap.forEach(c => { if(counts[c.val().day] !== undefined) counts[c.val().day]++; });
      
      const ctx = document.getElementById('trafficChart').getContext('2d');
      if(trafficChart) trafficChart.destroy();
      trafficChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: Object.keys(counts),
          datasets: [{
            label: 'Visitors',
            data: Object.values(counts),
            backgroundColor: '#006400',
            borderRadius: 8
          }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    });
  }

  function handleSignUp() {
    const id = document.getElementById('regID').value.trim().replace(/\./g, '_');
    const data = {
      name: document.getElementById('regName').value,
      type: document.getElementById('regType').value,
      course: document.getElementById('regCourse').value,
      photo: document.getElementById('regPhoto').value
    };
    db.ref('users/' + id).set(data).then(() => { 
        alert("Registered!"); 
        switchTab('timein'); 
    });
  }
</script>
</body>
</html>
