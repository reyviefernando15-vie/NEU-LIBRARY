<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEU Library - Mobile Ready</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --neu-green: #006400; 
      --neu-gold: #FFD700;  
      --bg: #f4f6f9;
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding-bottom: 50px; /* Space para sa mobile keyboard */
    }

    /* NAVIGATION - Mobile Optimized */
    .topnav { 
      display: flex; 
      flex-direction: column; /* Stack sa mobile */
      align-items: center; 
      padding: 15px; 
      background: white; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      gap: 10px;
    }
    
    @media (min-width: 600px) {
      .topnav { flex-direction: row; justify-content: space-between; padding: 10px 30px; }
    }

    .logo-area { display: flex; align-items: center; gap: 8px; }
    .logo-img { height: 40px; }
    .logo-text { font-weight: 800; font-size: 1.1rem; color: var(--neu-green); }

    .nav-links { display: flex; gap: 5px; width: 100%; justify-content: center; }
    .nav-links a { 
      font-size: 0.85rem; 
      color: #555; 
      text-decoration: none; 
      padding: 8px 12px; 
      border-radius: 20px; 
      font-weight: 600; 
    }
    .nav-links a.active { background: var(--neu-green); color: white; }

    .container { width: 95%; max-width: 1000px; margin: 15px auto; }
    
    .card { 
      background: white; 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 2px 12px rgba(0,0,0,0.05); 
      margin-bottom: 15px; 
    }

    input, select { 
      width: 100%; 
      padding: 14px; 
      margin-bottom: 12px; 
      border-radius: 8px; 
      border: 1px solid #ddd; 
      font-size: 16px; /* Maiwasan ang auto-zoom sa iPhone */
      box-sizing: border-box;
    }

    button { 
      background: var(--neu-green); 
      color: white; 
      border: none; 
      padding: 16px; 
      border-radius: 8px; 
      font-weight: bold; 
      width: 100%; 
      font-size: 1rem; 
    }

    /* Admin Grid - Responsive */
    .admin-grid { display: flex; flex-direction: column; gap: 15px; }
    @media (min-width: 800px) {
      .admin-grid { display: grid; grid-template-columns: 1fr 1fr; }
    }

    /* Live Logs Mobile Style */
    .log-item { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 10px; 
      border-bottom: 1px solid #eee; 
    }
    .log-info { display: flex; align-items: center; gap: 10px; }
    .log-thumb { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .log-details b { font-size: 0.9rem; display: block; }
    .log-details span { font-size: 0.75rem; color: #777; }
    .log-time { font-size: 0.8rem; color: var(--neu-green); font-weight: bold; }

    .hidden { display: none; }
    .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--neu-green); object-fit: cover; }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="logo-area">
    <img src="neu.png" alt="Logo" class="logo-img">
    <div class="logo-text">NEU LIBRARY</div>
  </div>
  <div class="nav-links">
    <a href="#" id="link-timein" class="active" onclick="switchTab('timein')">Dashboard</a>
    <a href="#" id="link-signup" onclick="switchTab('signup')">Register</a>
    <a href="#" id="link-admin" onclick="switchTab('admin')">Admin</a>
  </div>
</nav>

<div class="container">
  <div id="section-timein" class="card">
    <h3 style="margin-top:0">Attendance Log</h3>
    <input type="text" id="idInput" placeholder="Enter ID Number" onkeydown="if(event.key==='Enter') handleTimeIn()">
    <button onclick="handleTimeIn()">TIME IN</button>

    <div id="userProfile" class="card" style="margin-top:20px; text-align:center; display:none; border: 2px solid var(--neu-gold);">
      <img id="dispPic" src="" class="profile-pic">
      <h3 id="dispName" style="margin:10px 0 5px; color: var(--neu-green);"></h3>
      <p id="dispDetails" style="margin:0 0 15px; font-size:0.9rem; color:#666;"></p>
      <div style="text-align: left;">
        <small><b>Recent History:</b></small>
        <div id="personalLogs" style="font-size: 0.85rem; margin-top:5px;"></div>
      </div>
    </div>
  </div>

  <div id="section-signup" class="card hidden">
    <h3>Register Member</h3>
    <input type="text" id="regID" placeholder="ID (e.g. 24-0001)">
    <input type="text" id="regName" placeholder="Full Name">
    <input type="text" id="regCourse" placeholder="Course & Year">
    <select id="regType">
      <option value="Student">Student</option>
      <option value="Faculty">Faculty</option>
    </select>
    
    <label style="font-size:0.8rem; font-weight:bold;">Upload Photo:</label>
    <input type="file" id="regFile" accept="image/*">
    <input type="hidden" id="regBase64">
    
    <button onclick="handleSignUp()" style="margin-top:10px;">SAVE DATA</button>
  </div>

  <div id="section-admin" class="hidden">
    <div class="admin-grid">
      <div class="card">
        <h4>Weekly Traffic</h4>
        <div style="height:200px;"><canvas id="myChart"></canvas></div>
      </div>
      <div class="card">
        <h4>Live Activity</h4>
        <div id="adminLogs" style="max-height: 300px; overflow-y: auto;"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB0xwF6fFbPD_zD6458t_19VWMwocQiV3I",
    authDomain: "sfdasdafd.firebaseapp.com",
    databaseURL: "https://sfdasdafd-default-rtdb.firebaseio.com",
    projectId: "sfdasdafd",
    storageBucket: "sfdasdafd.firebasestorage.app",
    messagingSenderId: "701386389930",
    appId: "1:701386389930:web:d1d08e0f520dd7770993d3"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let chartObj = null;

  // IMAGE TO BASE64
  document.getElementById('regFile').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = () => document.getElementById('regBase64').value = reader.result;
    reader.readAsDataURL(e.target.files[0]);
  });

  // SECURE TAB SWITCH
  function switchTab(tab) {
    if (tab === 'admin') {
      const p = prompt("Admin Password:");
      if (p !== "admin123") return alert("Wrong Password");
    }

    document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    
    document.getElementById('section-' + tab).classList.remove('hidden');
    document.getElementById('link-' + tab).classList.add('active');

    if (tab === 'admin') { loadAnalytics(); loadLiveLogs(); }
  }

  function handleSignUp() {
    const id = document.getElementById('regID').value.trim().replace(/\./g, '_');
    const photo = document.getElementById('regBase64').value;
    if (!id || !photo) return alert("Complete all info and photo!");

    const data = {
      name: document.getElementById('regName').value,
      course: document.getElementById('regCourse').value,
      type: document.getElementById('regType').value,
      photo: photo
    };

    db.ref('users/' + id).set(data).then(() => {
      alert("Registered!");
      location.reload();
    });
  }

  function handleTimeIn() {
    const id = document.getElementById('idInput').value.trim().replace(/\./g, '_');
    db.ref('users/' + id).once('value', snap => {
      if (!snap.exists()) return alert("Not Registered!");

      const u = snap.val();
      const now = new Date();
      const log = {
        id: id, name: u.name, photo: u.photo, course: u.course,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
        day: now.toLocaleDateString('en-US', {weekday:'short'})
      };

      db.ref('logs').push(log).then(() => {
        document.getElementById('userProfile').style.display = 'block';
        document.getElementById('dispPic').src = u.photo;
        document.getElementById('dispName').innerText = u.name;
        document.getElementById('dispDetails').innerText = u.course;
        document.getElementById('idInput').value = "";
        
        // Show Personal History
        db.ref('logs').orderByChild('id').equalTo(id).limitToLast(3).on('value', s => {
          let h = "";
          s.forEach(c => { h = `<div>• ${c.val().date} | ${c.val().time}</div>` + h; });
          document.getElementById('personalLogs').innerHTML = h;
        });
      });
    });
  }

  function loadAnalytics() {
    db.ref('logs').on('value', snap => {
      const data = { Mon:0, Tue:0, Wed:0, Thu:0, Fri:0, Sat:0, Sun:0 };
      snap.forEach(c => { if(data[c.val().day] !== undefined) data[c.val().day]++; });

      const ctx = document.getElementById('myChart').getContext('2d');
      if(chartObj) chartObj.destroy();
      chartObj = new Chart(ctx, {
        type: 'line',
        data: {
          labels: Object.keys(data),
          datasets: [{ label: 'Visitors', data: Object.values(data), borderColor: '#006400', tension: 0.3, fill: true, backgroundColor: 'rgba(0,100,0,0.1)' }]
        },
        options: { maintainAspectRatio: false }
      });
    });
  }

  function loadLiveLogs() {
    db.ref('logs').limitToLast(15).on('value', snap => {
      let html = "";
      let arr = [];
      snap.forEach(c => arr.push(c.val()));
      arr.reverse().forEach(l => {
        html += `
          <div class="log-item">
            <div class="log-info">
              <img src="${l.photo}" class="log-thumb">
              <div class="log-details">
                <b>${l.name}</b>
                <span>${l.course}</span>
              </div>
            </div>
            <div class="log-time">${l.time}</div>
          </div>`;
      });
      document.getElementById('adminLogs').innerHTML = html;
    });
  }
</script>

</body>
</html>
