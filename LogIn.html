<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Library - Admin Login</title>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body class="login-page">
  <div class="login-container">
    <!-- Logo & Header -->
    <div class="login-header">
      <img src="neu.png" alt="NEU Logo" class="login-logo">
      <h1>NEU Library Management</h1>
      <p>Administrator Portal</p>
    </div>

    <!-- Google Sign-In Section -->
    <div class="login-form">
      <div id="loginSection" class="login-section">
        <h3>Sign In with Google</h3>
        <p class="login-info">Use your NEU email to access the admin dashboard.</p>
        
        <button id="btnGoogleSignIn" type="button" class="btn-google">
          <svg width="20" height="20" viewBox="0 0 24 24" style="display: inline-block; margin-right: 10px;">
            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign In with Google
        </button>

        <div id="googleUserInfo" class="google-user-info hidden">
          <p>Signed in as: <strong id="googleUserName"></strong> <span id="googleUserEmail"></span></p>
          <button id="btnGoogleSignOut" type="button" class="btn-secondary">Sign Out</button>
        </div>
      </div>

      <!-- Role Selection -->
      <div id="roleSelection" class="role-section hidden">
        <h3>Select Your Role</h3>
        <p class="login-info">Choose your role to access the appropriate dashboard.</p>
        
        <div class="role-options">
          <label class="role-card">
            <input type="radio" name="role" value="super-admin" class="role-radio">
            <div class="role-card-content">
              <h4>👑 Super Admin</h4>
              <p>Full system access - can manage users, delete records, and access all features</p>
            </div>
          </label>

          <label class="role-card">
            <input type="radio" name="role" value="librarian" class="role-radio">
            <div class="role-card-content">
              <h4>📚 Librarian</h4>
              <p>Can scan QR codes, manage books, view logs, but cannot delete records</p>
            </div>
          </label>

          <label class="role-card">
            <input type="radio" name="role" value="staff" class="role-radio">
            <div class="role-card-content">
              <h4>👤 Staff</h4>
              <p>Limited access - can view reports and student records only</p>
            </div>
          </label>
        </div>

        <div class="role-submission">
          <button id="btnContinueAsAdmin" type="button" class="btn-primary btn-large">Continue to Dashboard →</button>
          <button id="btnChangeUser" type="button" class="btn-secondary">← Change User</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <a href="index.html" class="student-link">← Back to Student Portal</a>
      <p class="login-disclaimer">For authorized administrators only. All activities are logged.</p>
    </div>
  </div>
</body>
</html>
